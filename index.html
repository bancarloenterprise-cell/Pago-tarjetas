<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancarlo Cloud - Control de Crédito</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #000000; margin: 0; padding: 20px; color: #f1f5f9; }
        .payment-container { max-width: 420px; margin: 30px auto; background: #111111; border-radius: 16px; border: 2px solid #e2cb99; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .title { font-size: 18px; font-weight: 800; color: #e2cb99; text-transform: uppercase; text-align: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 12px; }
        .form-group { margin-bottom: 20px; }
        .form-input { width: 100%; padding: 14px; border: 1px solid #333; border-radius: 10px; background-color: #050505; color: white; box-sizing: border-box; }
        .btn-connect { width: 100%; background-color: #3b82f6; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .data-box { background: #090909; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 14px; font-size: 14px; }
        .label { color: #94a3b8; }
        .value { font-weight: bold; color: #ffffff; }
        .debt-highlight { font-size: 20px; color: #ef4444; font-weight: 800; }
        .dates-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #050505; border: 1px solid #222; }
        .dates-table th, .dates-table td { padding: 10px; font-size: 12px; border-bottom: 1px solid #222; }
        .btn-pay { width: 100%; background-color: #10b981; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 15px; display: none; }
        .control-panel-box { background: #090909; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-top: 15px; display: none; align-items: center; justify-content: space-between; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2e384d; border-radius: 34px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: #f59e0b; }
        input:checked + .slider:before { transform: translateX(20px); }
        .status-msg { margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 13px; text-align: center; display: none; }
        .success { background-color: #10b981; color: #000; }
        .error { background-color: #7f1d1d; color: #fca5a5; }
    </style>
</head>
<body>

    <div class="payment-container">
        <div class="title">Bancarlo Cloud</div>
        <div class="form-group">
            <input type="email" id="user-email" class="form-input" placeholder="tu_correo@gmail.com">
        </div>
        <button class="btn-connect" onclick="conectarCuentaNube()">Conectar</button>

        <div class="data-box" id="finance-panel">
            <div class="data-row"><span class="label">Disponible:</span><span class="value" id="val-credito">$0.00</span></div>
            <div class="data-row"><span class="label">Débito:</span><span class="value" id="val-debito" style="color: #10b981;">$0.00</span></div>
            <table class="dates-table">
                <tr><th>Concepto</th><th>Fecha</th></tr>
                <tr><td>Corte</td><td id="table-corte">--/--/----</td></tr>
                <tr><td>Límite (14 días)</td><td id="table-pago" style="color: #f59e0b;">--/--/----</td></tr>
            </table>
            <div class="data-row" style="margin-top:15px;"><span class="label">Interés (25%):</span><span class="value" id="val-interes" style="color: #f59e0b;">$0.00</span></div>
            <div class="data-row"><span class="label">Total Exigible:</span><span class="debt-highlight" id="val-deuda">$0.00</span></div>
        </div>

        <button class="btn-pay" id="main-pay-btn" onclick="ejecutarPagoProgresivo()">Pagar con Débito</button>

        <div class="control-panel-box" id="auto-pay-panel" style="display: flex;">
            <div>
                <div style="font-size: 14px; font-weight: bold;">Pago Automático</div>
                <div style="font-size: 12px; color: #64748b;" id="txt-auto-pay">Desactivado</div>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggle-auto-pay" onchange="toggleAutoPay()">
                <span class="slider"></span>
            </label>
        </div>
        <div id="status-box" class="status-msg"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDNnq2YzWJLi_YfPNqgRY4oCMKOJQjrOGw", databaseURL: "https://bancarlo-23297-default-rtdb.firebaseio.com", projectId: "bancarlo-23297" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let myCleanKey = "", saldoDebito = 0, creditoDisponible = 2000, intereses = 0, autoPayInterval = null;
        let fechaCorteFija = null;

        function conectarCuentaNube() {
            const email = document.getElementById('user-email').value.trim();
            if (!email) return;
            myCleanKey = email.toLowerCase().replace(/\./g, '_');
            
            // Fijar fecha de corte al iniciar sesión si no existe
            if(!fechaCorteFija) fechaCorteFija = new Date();

            database.ref('users/' + myCleanKey).on('value', (snap) => {
                const data = snap.val() || { debito: 3000, credito: 2000, intereses_acumulados: 0 };
                saldoDebito = data.debito; creditoDisponible = data.credito; intereses = data.intereses_acumulados;
                
                document.getElementById('val-debito').innerText = '$' + saldoDebito.toFixed(2);
                document.getElementById('val-credito').innerText = '$' + creditoDisponible.toFixed(2);
                document.getElementById('val-interes').innerText = '$' + intereses.toFixed(2);
                document.getElementById('val-deuda').innerText = '$' + ((2000 - creditoDisponible) + intereses).toFixed(2);
                
                document.getElementById('table-corte').innerText = fechaCorteFija.toLocaleDateString();
                let limite = new Date(fechaCorteFija);
                limite.setDate(limite.getDate() + 14);
                document.getElementById('table-pago').innerText = limite.toLocaleDateString();

                document.getElementById('finance-panel').style.display = "block";
                document.getElementById('main-pay-btn').style.display = "block";
            });
        }

        function ejecutarPagoProgresivo() {
            let deuda = (2000 - creditoDisponible) + intereses;
            if (deuda <= 0) return;
            let montoAPagar = Math.min(saldoDebito, deuda);
            
            database.ref('users/' + myCleanKey).update({
                debito: parseFloat((saldoDebito - montoAPagar).toFixed(2)),
                credito: parseFloat((creditoDisponible + montoAPagar - intereses).toFixed(2)),
                intereses_acumulados: 0
            });
            mostrarMensaje("Pago realizado: $" + montoAPagar.toFixed(2), "success");
        }

        function toggleAutoPay() {
            const active = document.getElementById('toggle-auto-pay').checked;
            document.getElementById('txt-auto-pay').innerText = active ? "Activo" : "Desactivado";
            
            if (active) {
                autoPayInterval = setInterval(() => {
                    let ahora = new Date();
                    let limite = new Date(fechaCorteFija);
                    limite.setDate(limite.getDate() + 14);

                    if (ahora > limite) {
                        // Aplicar interés del 25% si se pasó la fecha
                        if(intereses == 0) {
                            let nuevaDeuda = (2000 - creditoDisponible) * 0.25;
                            database.ref('users/' + myCleanKey).update({ intereses_acumulados: nuevaDeuda });
                        }
                        ejecutarPagoProgresivo();
                    }
                }, 10000);
            } else {
                clearInterval(autoPayInterval);
            }
        }

        function mostrarMensaje(txt, tipo) {
            const box = document.getElementById('status-box');
            box.className = "status-msg " + tipo;
            box.innerText = txt;
            box.style.display = "block";
            setTimeout(() => box.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
