<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bancarlo Cloud - Sistema Integral</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #e2cb99; }
        .input-box { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #10b981; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; border-radius: 8px; }
        .data-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Bancarlo Cloud</h3>
        <input type="email" id="email" class="input-box" placeholder="Correo electrónico">
        <button class="btn" onclick="cargarCuenta()">Cargar Cuenta</button>
        
        <div id="panel" style="display:none;">
            <div class="data-row"><span>Deuda Total:</span><span id="val-deuda">$0.00</span></div>
            <div id="info-fechas" style="font-size: 11px; color: #888;"></div>
            <input type="number" id="abono" class="input-box" placeholder="Monto a abonar">
            <button class="btn" onclick="procesarAbono()">Realizar Abono</button>
            <div class="data-row">
                <span>Pago Auto (Fecha Límite)</span>
                <input type="checkbox" id="auto-pay" onchange="toggleAutoPay()">
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDNnq2YzWJLi_YfPNqgRY4oCMKOJQjrOGw", databaseURL: "https://bancarlo-23297-default-rtdb.firebaseio.com", projectId: "bancarlo-23297" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let userEmail = "", userRef;

        function cargarCuenta() {
            userEmail = document.getElementById('email').value.toLowerCase().replace(/\./g, '_');
            userRef = db.ref('users/' + userEmail);
            userRef.on('value', (snap) => {
                let data = snap.val() || { inicio: new Date().getTime(), deuda: 1000, hist: [] };
                
                const inicio = new Date(data.inicio);
                const corte = new Date(inicio.getTime() + (14 * 86400000));
                const limite = new Date(corte.getTime() + (10 * 86400000));
                
                // Lógica de intereses 25%
                if (new Date() > limite && data.deuda > 0 && !data.interesCargado) {
                    data.deuda *= 1.25;
                    userRef.update({ deuda: data.deuda, interesCargado: true, hist: [...(data.hist || []), "Interés 25% aplicado"] });
                }

                document.getElementById('panel').style.display = 'block';
                document.getElementById('val-deuda').innerText = '$' + data.deuda.toFixed(2);
                document.getElementById('info-fechas').innerText = `Inicio: ${inicio.toLocaleDateString()} | Corte: ${corte.toLocaleDateString()} | Pago: ${limite.toLocaleDateString()}`;
                
                if (document.getElementById('auto-pay').checked && new Date() >= limite) procesarAbono(data.deuda);
            });
        }

        function procesarAbono(monto) {
            const val = monto || parseFloat(document.getElementById('abono').value);
            userRef.once('value', (s) => {
                const d = s.val();
                const nuevaDeuda = Math.max(0, d.deuda - val);
                userRef.update({ deuda: nuevaDeuda, interesCargado: nuevaDeuda > 0 ? d.interesCargado : false });
                alert("Operación realizada");
            });
        }

        function toggleAutoPay() { /* Lógica de estado guardada en Firebase */ }
    </script>
</body>
</html>
