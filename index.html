<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancarlo Cloud - Control de Crédito y Dispersión</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #000000; margin: 0; padding: 20px; color: #f1f5f9; }
        .payment-container { max-width: 420px; margin: 30px auto; background: #111111; border-radius: 16px; border: 2px solid #e2cb99; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .title { font-size: 18px; font-weight: 800; color: #e2cb99; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; margin-bottom: 20px; text-align: center; border-bottom: 1px solid #222222; padding-bottom: 12px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 14px; border: 1px solid #333333; border-radius: 10px; font-size: 15px; box-sizing: border-box; background-color: #050505; color: white; }
        .form-input:focus { border-color: #10b981; outline: none; }
        .btn-connect { width: 100%; background-color: #3b82f6; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 20px; text-transform: uppercase; }
        .btn-connect:hover { background-color: #2563eb; }
        .data-box { background: #090909; border: 1px solid #222222; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; }
        .data-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; font-size: 14px; }
        .label { color: #94a3b8; }
        .value { font-weight: bold; color: #ffffff; }
        .debt-highlight { font-size: 20px; color: #ef4444; font-weight: 800; }
        .dates-table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 15px; background-color: #050505; border: 1px solid #222222; border-radius: 8px; overflow: hidden; }
        .dates-table th, .dates-table td { padding: 10px; text-align: left; font-size: 12px; border-bottom: 1px solid #222222; }
        .dates-table th { background-color: #1a1a1a; color: #e2cb99; font-weight: 700; }
        .dates-table td { color: #ffffff; }
        .btn-pay { width: 100%; background-color: #10b981; color: #000000; border: none; padding: 15px; border-radius: 10px; font-size: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 15px; display: none; }
        .btn-history { width: 100%; background-color: #475569; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 12px; display: none; }
        .control-panel-box { background: #090909; border: 1px solid #222222; border-radius: 12px; padding: 15px; margin-top: 15px; display: none; justify-content: space-between; align-items: center; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; min-width: 44px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-auto { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2e384d; transition: .3s; border-radius: 34px; }
        .slider-auto:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider-auto { background-color: #f59e0b; }
        input:checked + .slider-auto:before { transform: translateX(20px); }
        .status-msg { margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; text-align: center; display: none; }
        .success { background-color: #10b981; color: #000000; }
        .error { background-color: #7f1d1d; color: #fca5a5; border: 1px solid #b91c1c; }
    </style>
</head>
<body>

    <div class="payment-container">
        <div class="title">Bancarlo Cloud - Control</div>
        <div class="form-group">
            <label for="user-email">Correo Electrónico:</label>
            <input type="email" id="user-email" class="form-input" placeholder="tu_correo@gmail.com">
        </div>
        <button class="btn-connect" onclick="conectarCuentaNube()">Conectar</button>

        <div class="data-box" id="finance-panel">
            <div class="data-row">
                <span class="label">Deuda Actual:</span>
                <span class="debt-highlight" id="val-deuda">$0.00</span>
            </div>
            <table class="dates-table">
                <tr><th>Fecha Inicio</th><td id="t-inicio">--</td></tr>
                <tr><th>Fecha Corte (14 días)</th><td id="t-corte">--</td></tr>
                <tr><th>Fecha Pago (24 días)</th><td id="t-pago" style="color: #f59e0b;">--</td></tr>
            </table>
        </div>

        <button class="btn-pay" id="main-pay-btn" onclick="ejecutarPagoParcial()">Pagar lo que tengas disponible</button>

        <div class="control-panel-box" id="auto-pay-panel" style="display: flex;">
            <div>
                <div style="font-size: 13px; font-weight: bold;">Pago Automático</div>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggle-auto-pay" onchange="toggleAutoPay()">
                <span class="slider-auto"></span>
            </label>
        </div>
        <div id="status-box" class="status-msg"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDNnq2YzWJLi_YfPNqgRY4oCMKOJQjrOGw", databaseURL: "https://bancarlo-23297-default-rtdb.firebaseio.com", projectId: "bancarlo-23297" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let myCleanKey = "", autoPayInterval = null;

        function conectarCuentaNube() {
            const email = document.getElementById('user-email').value.trim().toLowerCase().replace(/\./g, '_');
            if(!email) return;
            myCleanKey = email;
            database.ref('users/' + myCleanKey).on('value', (snap) => {
                const data = snap.val() || { debito: 1000, credito: 2000, deuda: 0, fecha_inicio: null, intereses: 0 };
                
                // Si hay deuda y no hay fecha, registrar inicio
                if(data.deuda > 0 && !data.fecha_inicio) {
                    database.ref('users/' + myCleanKey + '/fecha_inicio').set(new Date().toISOString());
                }

                actualizarUI(data);
                document.getElementById('finance-panel').style.display = "block";
                document.getElementById('main-pay-btn').style.display = "block";
            });
        }

        function actualizarUI(data) {
            const now = new Date();
            let deuda = data.deuda || 0;
            
            if(data.fecha_inicio) {
                const start = new Date(data.fecha_inicio);
                const corte = new Date(start); corte.setDate(start.getDate() + 14);
                const pago = new Date(start); pago.setDate(start.getDate() + 24);

                document.getElementById('t-inicio').innerText = start.toLocaleDateString();
                document.getElementById('t-corte').innerText = corte.toLocaleDateString();
                document.getElementById('t-pago').innerText = pago.toLocaleDateString();

                // Lógica de interés 25% si se pasó la fecha de pago
                if (now > pago && deuda > 0) {
                    deuda = deuda * 1.25;
                    database.ref('users/' + myCleanKey + '/deuda').set(deuda);
                }
            }
            document.getElementById('val-deuda').innerText = '$' + deuda.toFixed(2);
        }

        function ejecutarPagoParcial() {
            database.ref('users/' + myCleanKey).once('value', (snap) => {
                const d = snap.val();
                let abono = Math.min(d.debito, d.deuda);
                database.ref('users/' + myCleanKey).update({
                    debito: d.debito - abono,
                    deuda: d.deuda - abono
                });
                if(d.deuda - abono <= 0) database.ref('users/' + myCleanKey + '/fecha_inicio').remove();
                mostrarMensaje("Pago procesado: $" + abono.toFixed(2));
            });
        }

        function toggleAutoPay() {
            const active = document.getElementById('toggle-auto-pay').checked;
            if(active) {
                autoPayInterval = setInterval(ejecutarPagoParcial, 10000); // Revisa cada 10s
                mostrarMensaje("Pago automático activo");
            } else {
                clearInterval(autoPayInterval);
            }
        }

        function mostrarMensaje(txt) {
            const s = document.getElementById('status-box');
            s.innerText = txt; s.style.display = 'block';
            setTimeout(() => s.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
