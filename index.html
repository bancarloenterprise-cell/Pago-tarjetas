<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bancarlo Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .wrapper { width: 100%; max-width: 450px; border: 1px solid #e2cb99; border-radius: 12px; padding: 25px; background-color: #0b0b0b; }
        .header { text-align: center; font-weight: 800; color: #e2cb99; margin-bottom: 25px; font-size: 18px; }
        .label { font-size: 13px; color: #aaa; margin-bottom: 8px; }
        .input-box { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; margin-bottom: 15px; }
        .btn-conn { width: 100%; padding: 14px; background: #2563eb; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; margin-bottom: 25px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; font-size: 14px; color: #ddd; }
        .table-bg { background: #111; border-radius: 8px; padding: 15px; margin: 15px 0; border: 1px solid #222; }
        .table-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #222; }
        .table-header { color: #e2cb99; font-weight: bold; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #e2cb99; }
        .highlight-red { color: #ef4444; font-weight: 800; font-size: 16px; }
        .highlight-green { color: #10b981; font-weight: 800; }
        .btn-pay { width: 100%; padding: 18px; background: #10b981; border: none; color: #000; font-weight: 900; border-radius: 8px; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        .switch-box { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; color: #ccc; font-size: 14px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">AMORTIZACIÓN Y DISPERSIÓN CLOUD</div>
    <div class="label">Introduce tu Correo Electrónico:</div>
    <input type="email" id="email" class="input-box" placeholder="micorreo@gmail.com">
    <button class="btn-conn" onclick="initApp()">CONECTAR CUENTA BANCARIA</button>

    <div id="dashboard" style="display:none;">
        <div class="info-row"><span>Crédito Disponible:</span><span id="c-disp" style="font-weight:bold">--</span></div>
        <div class="info-row"><span>Saldo en Débito:</span><span id="s-deb" class="highlight-green">--</span></div>
        
        <div class="table-bg">
            <div class="table-row table-header"><span>Concepto</span><span>Fecha</span></div>
            <div class="table-row"><span>Fecha de Corte</span><span id="f-corte">--</span></div>
            <div class="table-row"><span>Fecha Límite de Pago</span><span id="f-pago">--</span></div>
            <div class="table-row"><span>Estatus de Plazo</span><span>Activo</span></div>
        </div>

        <div class="info-row"><span>Intereses (80% Compuesto):</span><span id="f-int">$0.00</span></div>
        <div class="info-row"><span>Deuda Total Exigible:</span><span id="d-total" class="highlight-red">--</span></div>

        <div class="switch-box">
            <span>Pago Automático:</span>
            <input type="checkbox" id="auto-pay">
        </div>

        <button class="btn-pay" onclick="processPayment()">PAGAR CON TARJETA DE DÉBITO</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDNnq2YzWJLi_YfPNqgRY4oCMKOJQjrOGw", databaseURL: "https://bancarlo-23297-default-rtdb.firebaseio.com", projectId: "bancarlo-23297" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let userKey = "";

    function initApp() {
        userKey = document.getElementById('email').value.trim().toLowerCase().replace(/\./g, '_');
        if(!userKey) return;
        db.ref('users/' + userKey).on('value', (s) => {
            const d = s.val() || {};
            let used = 2000 - (d.credito || 2000);
            if (used > 0 && !d.fecha_inicio) db.ref('users/' + userKey).update({ fecha_inicio: new Date().toISOString() });
            
            let totalInteres = 0;
            if (d.fecha_inicio) {
                let start = new Date(d.fecha_inicio);
                let limite = new Date(start); limite.setDate(start.getDate() + 24);
                
                // Lógica de Interés Compuesto Diario (80% anual)
                // Fórmula: A = P(1 + r/n)^(nt) -> tasa diaria = (1 + 0.80)^(1/365) - 1
                if (new Date() > limite && used > 0) {
                    let diasRetraso = Math.floor((new Date() - limite) / (1000 * 60 * 60 * 24)) + 1;
                    let tasaDiaria = Math.pow(1.80, 1/365) - 1;
                    // Interés compuesto: Deuda * ((1 + i)^n - 1)
                    totalInteres = used * (Math.pow(1 + tasaDiaria, diasRetraso) - 1);
                }
                
                document.getElementById('f-corte').innerText = new Date(start.setDate(start.getDate() + 14)).toLocaleDateString();
                document.getElementById('f-pago').innerText = limite.toLocaleDateString();
            }
            
            let total = used + totalInteres;
            document.getElementById('c-disp').innerText = '$' + (d.credito || 2000);
            document.getElementById('s-deb').innerText = '$' + (d.debito || 0);
            document.getElementById('f-int').innerText = '$' + totalInteres.toFixed(2);
            document.getElementById('d-total').innerText = '$' + total.toFixed(2);
            document.getElementById('dashboard').style.display = 'block';
        });
    }

    function processPayment() {
        db.ref('users/' + userKey).once('value', (s) => {
            const d = s.val();
            let used = (2000 - (d.credito || 2000));
            let available = d.debito || 0;
            if(available <= 0) return alert("Sin fondos.");
            let pay = Math.min(available, used);
            db.ref('users/' + userKey).update({ debito: available - pay, credito: (d.credito || 2000) + pay });
            if((used - pay) <= 0) db.ref('users/' + userKey + '/fecha_inicio').remove();
            alert("Pago aplicado: $" + pay.toFixed(2));
        });
    }
</script>
</body>
</html>
