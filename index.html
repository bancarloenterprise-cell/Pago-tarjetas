<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancarlo Cloud - Control de Crédito y Dispersión</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #000000; margin: 0; padding: 20px; color: #f1f5f9; }
        .payment-container { max-width: 420px; margin: 30px auto; background: #111111; border-radius: 16px; border: 2px solid #e2cb99; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .title { font-size: 18px; font-weight: 800; color: #e2cb99; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; margin-bottom: 20px; text-align: center; border-bottom: 1px solid #222222; padding-bottom: 12px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 14px; border: 1px solid #333333; border-radius: 10px; font-size: 15px; box-sizing: border-box; background-color: #050505; color: white; }
        .btn-connect { width: 100%; background-color: #3b82f6; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 20px; text-transform: uppercase; }
        .data-box { background: #090909; border: 1px solid #222222; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; }
        .data-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; font-size: 14px; }
        .label { color: #94a3b8; }
        .value { font-weight: bold; color: #ffffff; }
        .debt-highlight { font-size: 20px; color: #ef4444; font-weight: 800; }
        .dates-table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 15px; background-color: #050505; border: 1px solid #222222; border-radius: 8px; overflow: hidden; }
        .dates-table th, .dates-table td { padding: 10px; text-align: left; font-size: 12px; border-bottom: 1px solid #222222; }
        .dates-table th { background-color: #1a1a1a; color: #e2cb99; font-weight: 700; }
        .dates-table td { color: #ffffff; }
        .btn-pay { width: 100%; background-color: #10b981; color: #000000; border: none; padding: 15px; border-radius: 10px; font-size: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 15px; display: none; }
        .status-msg { margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; text-align: center; display: none; }
    </style>
</head>
<body>

    <div class="payment-container">
        <div class="title">Amortización y Dispersión Cloud</div>
        <div class="form-group">
            <label>Introduce tu Correo Electrónico:</label>
            <input type="email" id="user-email" class="form-input" placeholder="tu_correo@gmail.com">
        </div>
        <button class="btn-connect" onclick="conectarCuentaNube()">Conectar Cuenta Bancaria</button>

        <div class="data-box" id="finance-panel">
            <div class="data-row"><span class="label">Crédito Disponible:</span><span class="value" id="val-credito">$0.00</span></div>
            <div class="data-row"><span class="label">Saldo en Débito:</span><span class="value" id="val-debito" style="color: #10b981;">$0.00</span></div>
            
            <span class="label" style="font-size: 13px; font-weight: 600;">Control de Periodo Actual:</span>
            <table class="dates-table">
                <thead><tr><th>Concepto</th><th>Fecha</th></tr></thead>
                <tbody>
                    <tr><td>Fecha de Corte</td><td id="table-corte">--/--/----</td></tr>
                    <tr><td>Fecha Límite de Pago</td><td id="table-pago" style="color: #f59e0b; font-weight: bold;">--/--/----</td></tr>
                    <tr><td>Estatus de Plazo</td><td id="table-status">Calculando...</td></tr>
                </tbody>
            </table>
            
            <div class="data-row"><span class="label">Intereses Acumulados (12%):</span><span class="value" id="val-interes" style="color: #f59e0b;">$0.00</span></div>
            <div class="data-row" style="border-top: 1px dashed #222222; padding-top: 15px;"><span class="label" style="font-weight: bold;">Deuda Total Exigible:</span><span class="debt-highlight" id="val-deuda">$0.00</span></div>
        </div>

        <button class="btn-pay" id="main-pay-btn" onclick="ejecutarPagoParcial()">Pagar con Tarjeta de Débito</button>
        <div id="status-box" class="status-msg"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDNnq2YzWJLi_YfPNqgRY4oCMKOJQjrOGw", databaseURL: "https://bancarlo-23297-default-rtdb.firebaseio.com", projectId: "bancarlo-23297" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let myCleanKey = "", globalData = {};

        function conectarCuentaNube() {
            const email = document.getElementById('user-email').value.trim().toLowerCase().replace(/\./g, '_');
            if(!email) return;
            myCleanKey = email;
            
            database.ref('users/' + myCleanKey).on('value', (s) => {
                globalData = s.val() || {};
                
                // 1. Lógica de Fecha Inicio (se activa al gastar crédito)
                let creditoActual = globalData.credito || 2000;
                if (creditoActual < 2000 && !globalData.fecha_inicio) {
                    database.ref('users/' + myCleanKey + '/fecha_inicio').set(new Date().toISOString());
                }

                // 2. Renderizado de Fechas
                if (globalData.fecha_inicio) {
                    let inicio = new Date(globalData.fecha_inicio);
                    let corte = new Date(inicio); corte.setDate(inicio.getDate() + 14);
                    let pago = new Date(corte); pago.setDate(corte.getDate() + 10);
                    
                    document.getElementById('table-corte').innerText = corte.toLocaleDateString();
                    document.getElementById('table-pago').innerText = pago.toLocaleDateString();
                    document.getElementById('table-status').innerText = "Activo";
                }

                // 3. Cálculos financieros
                let deudaExigible = (2000 - creditoActual) + (globalData.intereses_acumulados || 0);
                document.getElementById('val-debito').innerText = '$' + (globalData.debito || 0).toFixed(0);
                document.getElementById('val-credito').innerText = '$' + creditoActual.toFixed(0);
                document.getElementById('val-deuda').innerText = '$' + deudaExigible.toFixed(0);
                document.getElementById('finance-panel').style.display = "block";
                document.getElementById('main-pay-btn').style.display = "block";
            });
        }

        // 4. Pago Parcial (Lógica solicitada: pagar lo que tengas hasta liquidar)
        function ejecutarPagoParcial() {
            let saldo = globalData.debito || 0;
            let deuda = (2000 - (globalData.credito || 2000)) + (globalData.intereses_acumulados || 0);
            
            if (saldo <= 0) return alert("No tienes saldo suficiente en débito.");
            
            let abono = Math.min(saldo, deuda); // Toma el mínimo entre lo que tienes y lo que debes
            
            database.ref('users/' + myCleanKey).update({
                debito: saldo - abono,
                credito: 2000, // Ajuste simplificado
                intereses_acumulados: 0
            });
            
            alert("Pago exitoso de $" + abono.toFixed(0) + ". Saldo pendiente: $" + (deuda - abono).toFixed(0));
        }
    </script>
</body>
</html>
