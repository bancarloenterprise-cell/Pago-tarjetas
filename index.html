<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancarlo Cloud - Control Integral</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #000000; margin: 0; padding: 20px; color: #f1f5f9; }
        .payment-container { max-width: 420px; margin: 30px auto; background: #111111; border-radius: 16px; border: 2px solid #e2cb99; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .title { font-size: 18px; font-weight: 800; color: #e2cb99; text-transform: uppercase; margin-bottom: 20px; text-align: center; border-bottom: 1px solid #222222; padding-bottom: 12px; }
        .data-box { background: #090909; border: 1px solid #222222; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 14px; font-size: 14px; }
        .label { color: #94a3b8; }
        .value { font-weight: bold; color: #ffffff; }
        .debt-highlight { font-size: 20px; color: #ef4444; font-weight: 800; }
        .dates-table { width: 100%; border-collapse: collapse; margin-top: 10px; background-color: #050505; border: 1px solid #222222; border-radius: 8px; overflow: hidden; }
        .dates-table th, .dates-table td { padding: 10px; text-align: left; font-size: 12px; border-bottom: 1px solid #222222; color: #ffffff; }
        .dates-table th { background-color: #1a1a1a; color: #e2cb99; }
        .btn-pay { width: 100%; background-color: #10b981; color: #000000; border: none; padding: 15px; border-radius: 10px; font-size: 15px; font-weight: 800; cursor: pointer; display: none; margin-top: 10px; }
        .status-msg { margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; text-align: center; display: none; }
        .success { background-color: #10b981; color: #000000; }
        .error { background-color: #7f1d1d; color: #fca5a5; }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="title">Bancarlo Cloud</div>
        <input type="email" id="user-email" style="width:100%; padding:14px; background:#050505; color:white; border-radius:10px; border:1px solid #333; box-sizing:border-box;" placeholder="tu_correo@gmail.com">
        <button onclick="conectarCuentaNube()" style="width:100%; padding:14px; margin:20px 0; background:#2563eb; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">CONECTAR CUENTA</button>

        <div class="data-box" id="finance-panel">
            <div class="data-row"><span class="label">Crédito Disponible:</span><span class="value" id="val-credito">$0.00</span></div>
            <div class="data-row"><span class="label">Saldo en Débito:</span><span class="value" style="color:#10b981;" id="val-debito">$0.00</span></div>
            <table class="dates-table">
                <tr><th>Concepto</th><th>Fecha</th></tr>
                <tr><td>Fecha de Corte</td><td id="table-corte">--/--/----</td></tr>
                <tr><td>Fecha Máxima</td><td id="table-pago" style="color:#f59e0b;">--/--/----</td></tr>
            </table>
            <div class="data-row"><span class="label">Intereses (12%):</span><span class="value" id="val-interes">$0.00</span></div>
            <div class="data-row"><span class="label" style="font-weight:bold;">Total Exigible:</span><span class="debt-highlight" id="val-deuda">$0.00</span></div>
        </div>
        
        <button class="btn-pay" id="main-pay-btn" onclick="ejecutarPagoUnico()">PAGAR CON DÉBITO</button>
        <div id="status-box" class="status-msg"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDNnq2YzWJLi_YfPNqgRY4oCMKOJQjrOGw", databaseURL: "https://bancarlo-23297-default-rtdb.firebaseio.com", projectId: "bancarlo-23297" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myKey = "";

        function conectarCuentaNube() {
            myKey = document.getElementById('user-email').value.trim().replace(/\./g, '_');
            db.ref('users/' + myKey).on('value', (snap) => {
                const d = snap.val();
                if (!d) return mostrarMensaje("Cuenta no encontrada", "error");
                
                document.getElementById('val-credito').innerText = '$' + (d.credito || 0).toLocaleString();
                document.getElementById('val-debito').innerText = '$' + (d.debito || 0).toLocaleString();
                document.getElementById('val-interes').innerText = '$' + (d.intereses_acumulados || 0).toLocaleString();
                document.getElementById('val-deuda').innerText = '$' + ((2000 - (d.credito || 2000)) + (d.intereses_acumulados || 0)).toLocaleString();
                document.getElementById('finance-panel').style.display = "block";
                document.getElementById('main-pay-btn').style.display = "block";
            });
        }

        function ejecutarPagoUnico() {
            db.ref('users/' + myKey).once('value').then(snap => {
                const d = snap.val();
                const total = (2000 - (d.credito || 2000)) + (d.intereses_acumulados || 0);
                if (d.debito >= total) {
                    db.ref('users/' + myKey).update({ debito: d.debito - total, credito: 2000, intereses_acumulados: 0 });
                    mostrarMensaje("Pago procesado con éxito", "success");
                } else {
                    mostrarMensaje("Saldo insuficiente", "error");
                }
            });
        }

        function mostrarMensaje(txt, tipo) {
            const box = document.getElementById('status-box');
            box.className = "status-msg " + tipo;
            box.innerText = txt;
            box.style.display = "block";
            setTimeout(() => box.style.display = "none", 4000);
        }
    </script>
</body>
</html>
